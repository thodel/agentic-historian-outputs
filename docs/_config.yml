title: Agentic Historian
description: >-
  Transkriptionen, Quellenbeschreibungen und Entitäten historischer Dokumente
  (14.–16. Jh.), erzeugt von der Agentic-Historian-Pipeline.
theme: minima

# Minima otherwise adds every page with a title to the header, including each
# processed document. Keep global navigation at collection level only; the
# catalogue itself provides access to individual outputs.
header_pages:
  - index.md
  - entities/index.md
  - methodology.md
  - about.md

# Pages serves this folder (Settings → Pages → main /docs). The publisher writes
# docs/<doc_id>/index.md pages; the build-index Action writes docs/index.md.
