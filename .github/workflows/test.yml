name: Test generators

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m unittest discover -s tests -v
      - run: python scripts/build_outputs.py
      - run: git diff --exit-code
      - run: node --check docs/assets/rec-viewer.js
